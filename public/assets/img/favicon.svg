<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 胡拍乱造四格标识:四个人 = 四个色格,顶部一条场记板斜纹 -->
  <rect x="2" y="2" width="60" height="60" rx="10" fill="#191F24"/>
  <g>
    <rect x="8" y="16" width="22" height="19" rx="3" fill="#FF4021"/>
    <rect x="34" y="16" width="22" height="19" rx="3" fill="#FFC529"/>
    <rect x="8" y="39" width="22" height="19" rx="3" fill="#2C6FEF"/>
    <rect x="34" y="39" width="22" height="19" rx="3" fill="#2FA24F"/>
  </g>
  <!-- 场记板顶梁斜纹 -->
  <g clip-path="url(#clap)">
    <rect x="8" y="6" width="48" height="7" fill="#F7F3EA"/>
    <g fill="#191F24">
      <path d="M8 13 L14 6 L20 6 L14 13 Z"/>
      <path d="M20 13 L26 6 L32 6 L26 13 Z"/>
      <path d="M32 13 L38 6 L44 6 L38 13 Z"/>
      <path d="M44 13 L50 6 L56 6 L50 13 Z"/>
    </g>
  </g>
  <defs>
    <clipPath id="clap"><rect x="8" y="6" width="48" height="7" rx="2"/></clipPath>
  </defs>
</svg>
