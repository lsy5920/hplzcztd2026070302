# ============================================================
# 胡拍乱造创作组 · Cloudflare Pages + D1 配置文件
# 用于本地开发调试:npx wrangler pages dev public --d1 DB
# 生产部署通过 Cloudflare 控制台连接 GitHub 仓库自动完成
# ============================================================

name = "hplz-website"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定(本地调试用)
# 生产环境需在 Cloudflare Pages → 设置 → 函数 → D1 数据库绑定 中添加
# 变量名:DB  数据库:hplz-db
[[d1_databases]]
binding = "DB"
database_name = "hplz-db"
database_id = "请填写你在 Cloudflare 创建的 D1 数据库 ID"
