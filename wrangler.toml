# ============================================================
# 胡拍乱造创作组 · Cloudflare Pages 配置(Supabase 版)
# 本地调试: npx wrangler pages dev public
# 生产部署: 推送到 GitHub，Cloudflare 自动同步
# ============================================================

name = "hplz-website"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Supabase 环境变量（非敏感，可写在此处）
# SUPABASE_KEYSUPABASE_KEY 为敏感密钥，请在 Cloudflare Pages 控制台
# 「设置 → 环境变量」中以 Secret 形式添加，不要写入本文件
[vars]
SUPABASE_URL = ""   # 部署前填入你的 Supabase 项目 URL，例如 https://xxxx.supabase.co
