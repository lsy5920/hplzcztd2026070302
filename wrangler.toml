# ============================================================
# 胡拍乱造创作组 · Cloudflare Pages + D1 配置文件
# ============================================================

name = "hplz-website"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
# database_id 填写方法:
#   Cloudflare 控制台 → Workers & Pages → D1 → 点开 hplz-db
#   页面顶部「Database ID」那串 UUID 就是(格式如 abc12345-xxxx-xxxx-xxxx-xxxxxxxxxxxx)
[[d1_databases]]
binding = "DB"
database_name = "hplz-db"
database_id = "请替换成你的D1数据库UUID"
