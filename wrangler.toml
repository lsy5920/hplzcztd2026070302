# ============================================================
# 胡拍乱造创作组 · Cloudflare Pages + D1 配置文件
# 用于本地开发调试:npx wrangler pages dev public --d1 DB
# 生产部署通过 Cloudflare 控制台连接 GitHub 仓库自动完成
# ============================================================

name = "hplz-website"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# -------------------------------------------------------
# D1 数据库绑定说明
# -------------------------------------------------------
# 生产部署:不需要在此文件写任何内容。
# 请到 Cloudflare Pages 控制台:
#   Settings → Functions → D1 database bindings
#   点「Add binding」,变量名填 DB,选择你的 D1 数据库
#   保存后重新部署即可。
#
# 本地调试(可选):若要在本机用 wrangler 调试,
# 取消以下注释并填入你的 database_id 后再运行:
#   npx wrangler pages dev public --d1 DB
#
# [[d1_databases]]
# binding = "DB"
# database_name = "hplz-db"
# database_id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
